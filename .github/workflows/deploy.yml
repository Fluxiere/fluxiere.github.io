name: Deploy Fluxière Platform to GitHub Pages

on:
  push:
    branches:
      - main # Triggers the pipeline every time you push to the main branch

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci # Performs a clean, fast installation of package locks

      - name: Compile Production Build
        run: npm run build

      - name: Deploy Build Assets to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist # Vite outputs compiled production assets into this directory folder
          branch: gh-pages # The static assets will automatically commit to this background branch